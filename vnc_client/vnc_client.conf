# VNC Client for RoomWizard - Configuration File
#
# This file is read from /opt/vnc_client/vnc_client.conf on the device.
# All settings can also be overridden via command-line arguments:
#   vnc_client --host <ip> --port <port> --password <pw>
#   vnc_client <host> [port]   (legacy positional syntax)
#
# Lines starting with # are comments. Whitespace around = is ignored.

# VNC server hostname or IP address
host = 192.168.50.56

# VNC server port (x11vnc on 5901, RealVNC on 5900)
port = 5901

# VNC authentication password (VncAuth / security type 2)
password = roomwizard

# Preferred encodings (most preferred first)
# Options: tight, zrle, copyrect, hextile, zlib, raw
encodings = tight zrle copyrect hextile zlib raw

# Tight encoding compression level (1-9, higher = more compression)
compress_level = 6

# Tight encoding JPEG quality (1-9, higher = better quality)
quality_level = 5
